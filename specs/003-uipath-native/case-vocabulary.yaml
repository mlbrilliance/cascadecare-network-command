# ── Event types ──────────────────────────────────────────────────────────
# Canonical event_type const values used in:
# - Maestro Trigger filterTree field matching
# - Integration Service API Workflow emitted payloads
# - Maestro Flow Demo Driver step payloads
# - specs/003-uipath-native/event-contracts/*.json-schema.json "event_type" const
#
# IMPORTANT: changing a value here requires updating the matching schema file
# AND any Maestro Trigger configurations that filter on event_type.
#
# Wall-clock annotations follow the canonical 300s demo storyboard in plan.md
# (R1=t+20s, R2=t+70s, R3=t+150s, R4=t+200s, R5=t+260s).
event_types:
  - provider-claim-anomaly       # provider-{northstar..epsilon} API Workflows, R1 setup (~t+20s)
  - multi-customer-correlation   # emitted by Multi-Customer Pattern Detector, R1 (t+20s)
  - vendor-attribution           # vendor-nimbus API Workflow, R2 (t+70s)
  - regulatory-subpoena          # regulator-tn-doi API Workflow, R3 (t+150s) — HERO
  - payer-demand                 # payer-apex API Workflow, R4 setup (t+200s)
  - insurer-directive            # insurer-aurora-specialty API Workflow, R4 HITL gate (t+200s)
  - litigation-event             # regulator-tn-doi (second call), R5 (t+260s)

# ── Source systems ─────────────────────────────────────────────────────────
# Canonical emitter slugs for every event payload's "source_system" field. These
# are the Integration Service API Workflow slugs (one per external system, ~13)
# plus the Coded Agent that emits the correlation event directly.
#
# Every source_system enum value in specs/003-uipath-native/event-contracts/*.json-schema.json
# MUST appear in this list. The role-id convention is <role>-<entity-id> (e.g.
# regulator-tn-doi, insurer-aurora-specialty), matching vocabulary.stakeholders ids.
# Cross-checked by tests/unit/event_contracts/test_event_schemas.py.
source_systems:
  # Provider API Workflows (×6)
  - provider-northstar
  - provider-alpha
  - provider-beta
  - provider-gamma
  - provider-delta
  - provider-epsilon
  # Payer API Workflows
  - payer-apex
  - payer-summitblue
  - payer-union-prairie
  - payer-lakeshore
  # Vendor / regulator / insurer / counsel API Workflows
  - vendor-nimbus
  - regulator-tn-doi
  - insurer-aurora-specialty
  - counsel-hawthorne
  # Coded Agent that emits its correlation event directly (not an API Workflow)
  - multi-customer-pattern-detector
