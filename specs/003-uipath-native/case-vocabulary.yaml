# ── Agents ──────────────────────────────────────────────────────────────
# key:         unique slug used in task.agent_key references
# agent_type:  coded | agent-builder
# llm:         uipath-first-party | claude-byo-llm
# prompt_file: path relative to agents/prompts/ (Markdown, authoritative system prompt)
agents:
  - key: claim-flow-anomaly-detector
    display_name: "Claim Flow Anomaly Detector"
    agent_type: coded
    llm: uipath-first-party
    prompt_file: claim_flow_anomaly_detector.md
    notes: "Classifies anomaly score on claim telemetry. Fires at Reversal 1 setup."
  - key: multi-customer-pattern-detector
    display_name: "Multi-Customer Pattern Detector"
    agent_type: coded
    llm: uipath-first-party
    prompt_file: multi_customer_pattern_detector.md
    notes: "Cross-provider correlation; emits cascade signal. Drives Reversal 1."
  - key: forensic-self-exam-agent
    display_name: "Forensic Self-Exam Agent"
    agent_type: coded
    llm: uipath-first-party
    prompt_file: forensic_self_exam_agent.md
    notes: "Coordinates internal investigation; produces ClearFlow vector determination."
  - key: vector-hypothesis-agent
    display_name: "Vector Hypothesis Agent"
    agent_type: agent-builder
    llm: claude-byo-llm
    prompt_file: vector_hypothesis_agent.md
    notes: "Determines attack vector (ClearFlow vs Nimbus). Drives Reversal 2."
  - key: baa-boundary-reasoner
    display_name: "BAA Boundary Reasoner"
    agent_type: agent-builder
    llm: claude-byo-llm
    prompt_file: baa_boundary_reasoner.md
    context_grounding_index: BAA-corpus
    notes: "Analyzes each provider's BAA terms against the subpoena scope. Six BAAs, six answers."
  - key: fiduciary-conflict-detector
    display_name: "Fiduciary Conflict Detector"
    agent_type: agent-builder
    llm: claude-byo-llm
    prompt_file: fiduciary_conflict_detector.md
    notes: "Multi-party obligation conflicts; produces HITL gate payload. Drives Reversal 4."
  - key: negligent-monitoring-risk-agent
    display_name: "Negligent Monitoring Risk Agent"
    agent_type: agent-builder
    llm: claude-byo-llm
    prompt_file: negligent_monitoring_risk_agent.md
    notes: "Co-defendant exposure for Reversal 5; privilege reshuffles follow."

