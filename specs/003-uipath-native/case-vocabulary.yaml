# CascadeCare Case Vocabulary Registry
# Single source of truth for cross-case reference names.
#
# All three caseplan.json files (master / stakeholder-parent / obligation-grandchild)
# MUST use IDs and names from this registry. Adding a new variable, stage, or task
# to a caseplan.json requires a matching entry here first.
#
# Verify consistency: uv run pytest tests/unit/case_vocabulary/ -v
# See also: specs/003-uipath-native/data-model.md (Data Fabric entity shapes)
#           specs/003-uipath-native/event-contracts/ (event payload schemas)

schema_version: "1.0"

# ── Variables ──────────────────────────────────────────────────────────────
# Keyed by owner_case (master | stakeholder_parent | obligation_grandchild).
# id:   the JSON field "id" in the caseplan.json variables array
# name: the JSON field "name" — used in UI and expression bindings
# type: string | integer | boolean | decimal | datetime
variables:
  master:
    - id: var_case_goal
      name: CaseGoal
      type: string
      notes: "Current master crisis objective. Shifts text at each reversal."
    - id: var_reversal_number
      name: ReversalNumber
      type: integer
      notes: "Count of master goal reversals fired. 0 at open; 5 at R5."
    - id: var_clearflow_vector_status
      name: ClearFlowVectorStatus
      type: string
      notes: "unknown | cleared | co-victim | co-defendant"
    - id: var_grandchild_case_count
      name: GrandchildCaseCount
      type: integer
      notes: "Running count of obligation-grandchild cases spawned."
    - id: var_simulated_day
      name: SimulatedDay
      type: integer
      notes: "Demo timeline day (0–90). Incremented by Demo Driver events."

  stakeholder_parent:
    # These variables will be wired when clearflow-stakeholder-parent is authored in Slice 010.
    # The consistency test skips this section until that caseplan.json exists.
    - id: var_stakeholder_id
      name: StakeholderId
      type: string
      notes: >
        Which provider/payer/vendor this parent case represents.
        Must match a vocabulary.stakeholders id (e.g. northstar, apex, nimbus).
    - id: var_master_case_id
      name: MasterCaseId
      type: string
      notes: "Back-reference to the spawning master case instance ID."
    - id: var_privilege_flag
      name: PrivilegeFlag
      type: string
      notes: "attorney-client | work-product | operational"
    - id: var_baa_disclosure_position
      name: BAADisclosurePosition
      type: string
      notes: "can_disclose | cannot_disclose | conditional | unknown"

  obligation_grandchild:
    # These variables will be wired when clearflow-obligation-grandchild is authored in Slice 010.
    - id: var_obligation_type
      name: ObligationType
      type: string
      notes: "baa-compliance | regulatory-response | investigation"
    - id: var_subpoena_reference_id
      name: SubpoenaReferenceId
      type: string
      notes: "ID of the RegulatorTemplate that triggered this grandchild."
    - id: var_parent_case_id
      name: ParentCaseId
      type: string
      notes: "Back-reference to the spawning stakeholder-parent instance ID."
    - id: var_master_case_id
      name: MasterCaseId
      type: string
      notes: "Back-reference to the master case instance ID (for cross-level queries)."

# ── Stages ──────────────────────────────────────────────────────────────
# id:    the JSON "id" field in the caseplan.json nodes array
# label: the data.label displayed on the Maestro Case canvas
# reversal: which R# event drives entry into this stage (master only)
stages:
  master:
    - id: Stage_ugoiTN
      label: "Initial Response"
      notes: "Entry: crisis initiated. No reversal — always first stage."
    - id: Stage_jsrEfr
      label: "Multi-Customer Investigation"
      reversal: 1
      notes: "Entry edge: 'Reversal 1: Multi-customer pattern confirmed'"
    - id: Stage_TJUXJV
      label: "Vector Isolation"
      reversal: 2
      notes: "Entry edge: 'Reversal 2: ClearFlow cleared as vector'"
    - id: Stage_JM1SVs
      label: "Regulatory Response"
      reversal: 3
      notes: "Entry edge: 'Reversal 3: TN DOI subpoena received'. Hero moment."
    - id: Stage_LKuLeU
      label: "Fiduciary Review"
      reversal: 4
      notes: "Entry edge: 'Reversal 4: Payer demands BAA data access'"
    - id: Stage_CZ5efq
      label: "Litigation Defense"
      reversal: 5
      notes: "Entry edge: 'Reversal 5: ClearFlow named co-defendant'"
    - id: Stage_JW7OlW
      label: "Closed"
      notes: "Terminal stage."

  stakeholder_parent:
    - id: Stage_5QJ0XA
      label: "Stakeholder Onboarding"
      notes: "Entry: parent case spawned (case-entered). Registers stakeholder + pulls BAA."
    - id: Stage_BHfIGb
      label: "Impact Assessment"
      notes: "Entry edge: 'Stakeholder registered'. Claim disruption + liquidity."
    - id: Stage_9fuQ8L
      label: "Obligation Determination"
      notes: "Entry edge: 'Impact assessed'. BAA boundary + spawns obligation grandchild."
    - id: Stage_SUCBZw
      label: "Stakeholder Resolved"
      notes: "Terminal stage."

  obligation_grandchild:
    - id: Stage_6x5Dzu
      label: "Obligation Intake"
      notes: "Entry: grandchild case spawned (case-entered). Classifies obligation."
    - id: Stage_F95sBP
      label: "Obligation Response"
      notes: "Entry edge: 'Obligation classified'. Prepare/file response + audit record."
    - id: Stage_otF4rP
      label: "Obligation Discharged"
      notes: "Terminal stage."

